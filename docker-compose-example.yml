version: '3.8'

services:
  twitch-tracker:
    build: .
    ports:
      - "5000:5000"
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - ACCESS_TOKEN=${ACCESS_TOKEN}
      - USER_ID=${USER_ID}
      - PARENT_DOMAIN=${PARENT_DOMAIN}
    restart: unless-stopped